checkCommands:
  fix: ruff check --fix . && ruff format .
  lint: pip install ruff && ruff check .
  types: pip install mypy && mypy src/
  test: pip install pytest && pytest tests/ -x -q -m "not requires_cuda"
beta:
  canApprovePullRequests: false
