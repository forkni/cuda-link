name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract changelog section for tag
        run: |
          tag="${GITHUB_REF_NAME#v}"
          awk -v v="$tag" '
            $0 ~ "^## \\["v"\\]" { flag=1; next }
            flag && /^## \[/     { exit }
            flag                 { print }
          ' CHANGELOG.md > RELEASE_NOTES.md
          echo "Release notes: $(wc -l < RELEASE_NOTES.md) lines"

      - name: Create GitHub Release with binary assets
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          files: |
            TOXES/CUDAIPCLink_v*.tox
            CUDA_Link_Example*.toe
          fail_on_unmatched_files: false
