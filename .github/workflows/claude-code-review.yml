name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    paths:
      - "**/*.py"
      - "pyproject.toml"
      - ".github/workflows/**"
      - "scripts/**"
      - "tests/**"
      - "td_exporter/**"
      - "benchmarks/**"

# Prevent multiple runs on rapid PR updates
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  claude-review:
    runs-on: ubuntu-latest
    timeout-minutes: 10  # Prevent runaway workflows
    permissions:
      contents: read
      pull-requests: write  # Required for plugin to post review comments
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        continue-on-error: true  # Don't fail PR status if Claude has issues
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: "*"  # Allow all bots (including claude[bot])
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: '/code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}'

      - name: Comment on failure
        if: failure()
        run: gh pr comment ${{ github.event.pull_request.number }} --body "Claude Code review encountered an error. Check the Actions log for details."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
